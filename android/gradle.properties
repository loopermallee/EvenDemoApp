# ---------- Android/Gradle tuning (CI-friendly) ----------
org.gradle.jvmargs=-Xmx3g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
# On small runners you can cap workers to reduce memory spikes:
# org.gradle.workers.max=2

# AndroidX flags
android.useAndroidX=true
android.enableJetifier=true

# Suppress warnings for CI (safe with compileSdk 34)
android.suppressUnsupportedCompileSdk=34

# Kotlin
kotlin.code.style=official