# android/gradle.properties

# -------- Gradle/Java tuning (works well on Actions' 7GB RAM runners) --------
org.gradle.jvmargs=-Xmx3g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
# If you still see memory spikes, uncomment and reduce workers:
# org.gradle.workers.max=2

# -------- AndroidX & Jetifier --------
android.useAndroidX=true
android.enableJetifier=true

# Silence warning when using compile/target SDK 34 on older AGP combos
android.suppressUnsupportedCompileSdk=34

# -------- Kotlin --------
kotlin.code.style=official