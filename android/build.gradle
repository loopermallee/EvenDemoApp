// Top-level Gradle file for the Android (Flutter) project.

allprojects {
    repositories {
        // Put Maven Central first for CI reliability
        mavenCentral()
        google()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(":app")

    // Stabilize dependency resolution on CI (avoids error_prone_annotations 404s)
    configurations.all {
        resolutionStrategy {
            force 'com.google.errorprone:error_prone_annotations:2.18.0'
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}